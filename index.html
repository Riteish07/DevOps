<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevOps Experiment 2</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            margin: 0;
            padding: 0;
            text-align: center;
            color: white;
        }

        .container {
            margin-top: 100px;
        }

        h1 {
            font-size: 40px;
        }

        p {
            font-size: 20px;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            border: none;
            background: white;
            color: #333;
            cursor: pointer;
            border-radius: 5px;
        }

        button:hover {
            background: #ddd;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>DevOps Experiment 2</h1>
        <p>Staging, Commit and Push using Git & GitHub</p>

        <button onclick="showMessage()">Click Me</button>
    </div>

    <script>
        function showMessage() {
            alert("Hello Ritesh! Your Git experiment is working 🚀");
        }
    </script>

</body>
</html>
